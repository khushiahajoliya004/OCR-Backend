<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Scanner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    /* ── Upload card ─────────────────────────────────── */
    .upload-card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .drop-zone {
      border: 2px dashed #c8ccd4;
      border-radius: 10px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #4f6ef7;
      background: #f5f7ff;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .drop-text {
      font-size: 14px;
      color: #555;
    }

    .drop-text span {
      color: #4f6ef7;
      font-weight: 600;
    }

    .drop-hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }

    /* Camera button row */
    .or-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: #bbb;
      font-size: 12px;
    }

    .or-row::before,
    .or-row::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }

    .btn-camera {
      width: 100%;
      padding: 11px;
      border: 1.5px solid #d0d4de;
      border-radius: 9px;
      background: #fff;
      color: #444;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-camera:hover {
      border-color: #4f6ef7;
      background: #f5f7ff;
      color: #4f6ef7;
    }

    /* Preview */
    #preview-wrap {
      display: none;
      margin-top: 16px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    #preview-wrap img {
      width: 100%;
      display: block;
      max-height: 280px;
      object-fit: contain;
      background: #f7f8fa;
    }

    #remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    #file-name {
      font-size: 12px;
      color: #777;
      margin-top: 8px;
      text-align: center;
    }

    /* Scan button */
    .btn-scan {
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-scan:hover:not(:disabled) {
      background: #3a57e0;
    }

    .btn-scan:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-scan:disabled {
      background: #a0adee;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Result card ─────────────────────────────────── */
    #result-section {
      display: none;
    }

    .result-card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .result-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .badge-success {
      background: #e8f8f0;
      color: #2e9e60;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .field-row:last-child {
      border-bottom: none;
    }

    .field-icon {
      font-size: 18px;
      width: 28px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .field-body {
      flex: 1;
    }

    .field-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .field-value {
      font-size: 14px;
      color: #222;
      font-weight: 500;
      word-break: break-all;
    }

    .field-value a {
      color: #4f6ef7;
      text-decoration: none;
    }

    .field-value a:hover {
      text-decoration: underline;
    }

    .conf-bar-wrap {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conf-bar {
      height: 3px;
      border-radius: 2px;
      background: #eee;
      flex: 1;
      max-width: 80px;
      overflow: hidden;
    }

    .conf-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: #4f6ef7;
      transition: width 0.4s;
    }

    .conf-label {
      font-size: 10px;
      color: #bbb;
    }

    /* Warning box */
    .warning-box {
      background: #fff8e6;
      border: 1px solid #f5d87a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #7a5c00;
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    /* Error box */
    .error-card {
      background: #fff2f2;
      border: 1px solid #ffbebe;
      border-radius: 14px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-align: center;
    }

    .error-card .error-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .error-card p {
      font-size: 14px;
      color: #c0392b;
      font-weight: 500;
    }

    .error-card small {
      font-size: 12px;
      color: #e07070;
    }

    /* Processing time */
    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #bbb;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    /* No result */
    .no-data {
      text-align: center;
      padding: 20px 0 8px;
      color: #aaa;
      font-size: 13px;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>Card Scanner</h1>
    <p class="subtitle">Upload or take a photo of a visiting card to extract contact info.</p>

    <!-- Upload card -->
    <div class="upload-card">

      <!-- Drop zone (file upload) -->
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/jpeg,image/jpg,image/png,image/webp" />
        <div class="drop-icon">🖼️</div>
        <div class="drop-text"><span>Click to upload</span> or drag & drop</div>
        <div class="drop-hint">JPG, PNG, WEBP — max 5 MB</div>
      </div>

      <!-- Camera option (shows native camera on mobile) -->
      <div class="or-row">or</div>
      <button class="btn-camera" id="camera-btn" type="button">
        📷 Take a Photo
      </button>
      <input type="file" id="camera-input" accept="image/*" capture="environment"
             style="display:none" />

      <!-- Preview -->
      <div id="preview-wrap">
        <img id="preview-img" src="" alt="Preview" />
        <button id="remove-btn" title="Remove">✕</button>
      </div>
      <p id="file-name"></p>

      <!-- Scan button -->
      <button class="btn-scan" id="scan-btn" type="button">
        <div class="spinner" id="spinner"></div>
        <span id="scan-label">Scan Card</span>
      </button>
    </div>

    <!-- Results -->
    <div id="result-section"></div>
  </div>

  <script>
    const API_URL = 'http://127.0.0.1:8000/api/v1/ocr';
    const API_KEY = 'test123';
    const fileInput = document.getElementById('file-input');
    const cameraInput = document.getElementById('camera-input');
    const cameraBtn = document.getElementById('camera-btn');
    const dropZone  = document.getElementById('drop-zone');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg  = document.getElementById('preview-img');
    const fileNameEl  = document.getElementById('file-name');
    const removeBtn   = document.getElementById('remove-btn');
    const scanBtn     = document.getElementById('scan-btn');
    const spinner     = document.getElementById('spinner');
    const scanLabel   = document.getElementById('scan-label');
    const resultSection = document.getElementById('result-section');

    let selectedFile = null;

    // ── File selection helpers ─────────────────────────────────────────────

    function setFile(file) {
      if (!file) return;
      selectedFile = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewWrap.style.display = 'block';
      fileNameEl.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
      resultSection.style.display = 'none';
      resultSection.innerHTML = '';
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      cameraInput.value = '';
      previewImg.src = '';
      previewWrap.style.display = 'none';
      fileNameEl.textContent = '';
      resultSection.style.display = 'none';
      resultSection.innerHTML = '';
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    cameraBtn.addEventListener('click', () => cameraInput.click());
    cameraInput.addEventListener('change', () => {
      if (cameraInput.files[0]) setFile(cameraInput.files[0]);
    });

    removeBtn.addEventListener('click', clearFile);

    // Drag & drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    // ── Scan ───────────────────────────────────────────────────────────────

    scanBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        showError('No file selected', 'Please upload or take a photo first.');
        return;
      }

      setLoading(true);

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'x-api-key': API_KEY },
          body: formData,
        });

        const json = await res.json();

        if (!res.ok) {
          const msg = json.detail || json.message || 'API error';
          showError('Request failed (' + res.status + ')', msg);
          return;
        }

        showResult(json);

      } catch (err) {
        showError('Connection failed', 'Could not reach the API. Make sure the backend is running on port 8000.');
      } finally {
        setLoading(false);
      }
    });

    // ── UI states ──────────────────────────────────────────────────────────

    function setLoading(on) {
      scanBtn.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
      scanLabel.textContent = on ? 'Scanning…' : 'Scan Card';
    }

    function showError(title, detail) {
      resultSection.style.display = 'block';
      resultSection.innerHTML = `
        <div class="error-card">
          <div class="error-icon">⚠️</div>
          <p>${esc(title)}</p>
          <small>${esc(detail)}</small>
        </div>`;
    }

    // ── Result rendering ───────────────────────────────────────────────────

    function showResult(json) {
      const data = json.data || {};
      const conf = json.confidence || {};
      const warnings = json.warnings || [];
      const procTime = json.processing_time_ms;

      // Field definitions: [key, label, icon, formatter]
      const fields = [
        ['name',        'Name',        '👤', v => esc(v)],
        ['designation', 'Designation', '💼', v => esc(v)],
        ['company',     'Company',     '🏢', v => esc(v)],
        ['phone',       'Phone',       '📞', v => formatPhone(v)],
        ['email',       'Email',       '✉️', v => formatEmail(v)],
        ['website',     'Website',     '🌐', v => formatWebsite(v)],
        ['address',     'Address',     '📍', v => esc(v)],
      ];

      const hasAny = fields.some(([k]) => data[k]);

      if (!hasAny) {
        resultSection.style.display = 'block';
        resultSection.innerHTML = `
          <div class="result-card">
            <div class="no-data">😕 No contact information could be extracted.<br>
            Try a clearer or higher-resolution image.</div>
          </div>`;
        return;
      }

      let warningHTML = '';
      if (warnings.length) {
        warningHTML = warnings.map(w =>
          `<div class="warning-box">⚠️ <span>${esc(w)}</span></div>`
        ).join('');
      }

      let fieldsHTML = '';
      for (const [key, label, icon, fmt] of fields) {
        const value = data[key];
        if (!value) continue;

        let displayValue;
        if (Array.isArray(value)) {
          displayValue = value.map(fmt).join('<br>');
        } else {
          displayValue = fmt(value);
        }

        const fieldConf = conf[key];
        let confHTML = '';
        if (fieldConf !== undefined) {
          const pct = Math.round(fieldConf * 100);
          const color = fieldConf >= 0.8 ? '#4f6ef7' : fieldConf >= 0.6 ? '#f0a500' : '#e74c3c';
          confHTML = `
            <div class="conf-bar-wrap">
              <div class="conf-bar">
                <div class="conf-bar-fill" style="width:${pct}%;background:${color}"></div>
              </div>
              <span class="conf-label">${pct}% confidence</span>
            </div>`;
        }

        fieldsHTML += `
          <div class="field-row">
            <div class="field-icon">${icon}</div>
            <div class="field-body">
              <div class="field-label">${label}</div>
              <div class="field-value">${displayValue}</div>
              ${confHTML}
            </div>
          </div>`;
      }

      const overallPct = conf.overall !== undefined ? Math.round(conf.overall * 100) : null;
      const metaHTML = `
        <div class="meta-row">
          <span>${overallPct !== null ? 'Overall confidence: ' + overallPct + '%' : ''}</span>
          <span>${procTime !== undefined ? 'Processed in ' + procTime + ' ms' : ''}</span>
        </div>`;

      resultSection.style.display = 'block';
      resultSection.innerHTML = `
        ${warningHTML}
        <div class="result-card">
          <div class="result-header">
            <span class="result-title">Extracted Info</span>
            <span class="badge-success">✓ Success</span>
          </div>
          ${fieldsHTML}
          ${metaHTML}
        </div>`;
    }

    // ── Formatters ─────────────────────────────────────────────────────────

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatPhone(v) {
      const digits = v.replace(/\D/g, '');
      return `<a href="tel:${esc(digits)}">${esc(v)}</a>`;
    }

    function formatEmail(v) {
      return `<a href="mailto:${esc(v)}">${esc(v)}</a>`;
    }

    function formatWebsite(v) {
      const href = /^https?:\/\//i.test(v) ? v : 'https://' + v;
      return `<a href="${esc(href)}" target="_blank" rel="noopener">${esc(v)}</a>`;
    }
  </script>
</body>
</html>
