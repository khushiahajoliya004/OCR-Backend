<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Scanner — OCR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
    }

    /* ── Hero header ─────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b5bdb 60%, #6366f1 100%);
      padding: 36px 24px 64px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #e0e7ff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Page body ───────────────────────────────────────── */
    .page-body {
      max-width: 540px;
      margin: -36px auto 48px;
      padding: 0 16px;
      position: relative;
    }

    /* ── Cards ───────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    /* ── Drop zone ───────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 14px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      background: #fafbff;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #3b5bdb;
      background: #eef2ff;
      transform: translateY(-1px);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 14px;
    }

    .drop-title {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .drop-title span { color: #3b5bdb; }

    .drop-sub {
      font-size: 12px;
      color: #94a3b8;
    }

    /* ── Or divider ──────────────────────────────────────── */
    .or-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 500;
    }

    .or-row::before,
    .or-row::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #f1f5f9;
    }

    /* ── Camera button ───────────────────────────────────── */
    .btn-camera {
      width: 100%;
      padding: 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      color: #475569;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-camera:hover {
      border-color: #3b5bdb;
      background: #eef2ff;
      color: #3b5bdb;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59,91,219,0.12);
    }

    /* ── Preview ─────────────────────────────────────────── */
    #preview-wrap {
      display: none;
      margin-top: 20px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    #preview-wrap img {
      width: 100%;
      display: block;
      max-height: 260px;
      object-fit: contain;
      background: #f8fafc;
    }

    #remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(15,23,42,0.65);
      backdrop-filter: blur(4px);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #remove-btn:hover { background: rgba(220,38,38,0.8); }

    #file-name {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 10px;
      text-align: center;
      font-weight: 500;
    }

    /* ── Scan button ─────────────────────────────────────── */
    .btn-scan {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      background: linear-gradient(135deg, #1e3a8a, #3b5bdb);
      color: #fff;
      border: none;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.02em;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(59,91,219,0.35);
    }

    .btn-scan:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,91,219,0.45);
    }

    .btn-scan:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-scan:disabled {
      background: linear-gradient(135deg, #93a5d4, #a5b4e8);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result section ──────────────────────────────────── */
    #result-section { display: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
      animation: fadeUp 0.35s ease forwards;
    }

    .result-top {
      background: linear-gradient(135deg, #1e3a8a, #3b5bdb);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-top-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-top-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .result-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .result-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 1px;
    }

    .badge-success {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    .result-body { padding: 8px 0; }

    /* ── Field rows ──────────────────────────────────────── */
    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 24px;
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.15s;
    }

    .field-row:last-child { border-bottom: none; }
    .field-row:hover { background: #fafbff; }

    .field-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .icon-name        { background: #eff6ff; }
    .icon-designation { background: #f0fdf4; }
    .icon-company     { background: #fef3c7; }
    .icon-phone       { background: #ecfdf5; }
    .icon-email       { background: #fdf4ff; }
    .icon-website     { background: #f0f9ff; }
    .icon-address     { background: #fff7ed; }

    .field-body { flex: 1; min-width: 0; }

    .field-label {
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .field-value {
      font-size: 14px;
      color: #1e293b;
      font-weight: 500;
      word-break: break-word;
      line-height: 1.5;
    }

    .field-value a {
      color: #3b5bdb;
      text-decoration: none;
      font-weight: 600;
    }

    .field-value a:hover { text-decoration: underline; }

    /* ── Confidence bar ──────────────────────────────────── */
    .conf-bar-wrap {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .conf-bar {
      height: 4px;
      border-radius: 4px;
      background: #f1f5f9;
      width: 72px;
      overflow: hidden;
    }

    .conf-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .conf-label {
      font-size: 10px;
      color: #cbd5e1;
      font-weight: 600;
    }

    /* ── Result footer ───────────────────────────────────── */
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #cbd5e1;
      padding: 14px 24px;
      border-top: 1px solid #f1f5f9;
      font-weight: 500;
    }

    /* ── Warning ─────────────────────────────────────────── */
    .warning-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12px;
      color: #92400e;
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-weight: 500;
      animation: fadeUp 0.3s ease;
    }

    /* ── Error card ──────────────────────────────────────── */
    .error-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      text-align: center;
      animation: fadeUp 0.3s ease;
    }

    .error-icon {
      width: 60px;
      height: 60px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
    }

    .error-card p {
      font-size: 15px;
      font-weight: 700;
      color: #991b1b;
      margin-bottom: 6px;
    }

    .error-card small {
      font-size: 13px;
      color: #b91c1c;
      line-height: 1.5;
    }

    /* ── No data ─────────────────────────────────────────── */
    .no-data {
      text-align: center;
      padding: 40px 24px;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.7;
    }

    .no-data-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* ── Camera modal ────────────────────────────────────── */
    .cam-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(6px);
    }

    .cam-overlay.open { display: flex; }

    .cam-modal {
      background: #0f172a;
      border-radius: 22px;
      overflow: hidden;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      animation: fadeUp 0.3s ease;
    }

    .cam-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .cam-title {
      font-size: 14px;
      font-weight: 700;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cam-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #94a3b8;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .cam-close:hover { background: rgba(239,68,68,0.3); color: #f87171; }

    .cam-video-wrap {
      position: relative;
      background: #000;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cam-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Viewfinder guide */
    .cam-video-wrap::after {
      content: '';
      position: absolute;
      inset: 20px;
      border: 2px solid rgba(99,102,241,0.5);
      border-radius: 12px;
      pointer-events: none;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.25);
    }

    /* Corner marks */
    .cam-corners {
      position: absolute;
      inset: 20px;
      pointer-events: none;
      z-index: 2;
    }

    .cam-corners span {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: #6366f1;
      border-style: solid;
      border-width: 0;
    }

    .cam-corners span:nth-child(1) { top: 0; left: 0;  border-top-width: 3px; border-left-width: 3px;  border-radius: 4px 0 0 0; }
    .cam-corners span:nth-child(2) { top: 0; right: 0; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
    .cam-corners span:nth-child(3) { bottom: 0; left: 0;  border-bottom-width: 3px; border-left-width: 3px;  border-radius: 0 0 0 4px; }
    .cam-corners span:nth-child(4) { bottom: 0; right: 0; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }

    .cam-status {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
      z-index: 3;
    }

    .cam-footer {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0f172a;
    }

    .btn-capture {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b5bdb, #6366f1);
      border: 4px solid rgba(255,255,255,0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: all 0.2s;
      box-shadow: 0 0 0 6px rgba(99,102,241,0.2);
    }

    .btn-capture:hover {
      transform: scale(1.08);
      box-shadow: 0 0 0 8px rgba(99,102,241,0.3);
    }

    .btn-capture:active { transform: scale(0.95); }

    .btn-flip {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #94a3b8;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-flip:hover { background: rgba(255,255,255,0.18); color: #e2e8f0; }

    /* flash effect on capture */
    @keyframes flash {
      0%   { opacity: 0; }
      20%  { opacity: 0.8; }
      100% { opacity: 0; }
    }

    .cam-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .cam-flash.go { animation: flash 0.4s ease forwards; }

    #cam-canvas { display: none; }

    .cam-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #64748b;
      font-size: 13px;
      font-weight: 500;
    }

    .cam-loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>

  <!-- Hero header -->
  <div class="hero">
    <div class="hero-badge">✦ AI-Powered OCR</div>
    <h1>📇 Card Scanner</h1>
    <p>Instantly extract contact details from any visiting card using smart OCR.</p>
  </div>

  <!-- Main content -->
  <div class="page-body">

    <!-- Upload card -->
    <div class="card">

      <!-- Drop zone -->
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/jpeg,image/jpg,image/png,image/webp" />
        <div class="drop-zone-icon">🖼️</div>
        <div class="drop-title"><span>Click to upload</span> or drag & drop</div>
        <div class="drop-sub">JPG, PNG, WEBP — max 5 MB</div>
      </div>

      <!-- Divider -->
      <div class="or-row">or</div>

      <!-- Camera button -->
      <button class="btn-camera" id="camera-btn" type="button">
        📷&nbsp; Use Camera
      </button>
      <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" />

      <!-- Image preview -->
      <div id="preview-wrap">
        <img id="preview-img" src="" alt="Preview" />
        <button id="remove-btn" title="Remove image">✕</button>
      </div>
      <p id="file-name"></p>

      <!-- Scan button -->
      <button class="btn-scan" id="scan-btn" type="button">
        <div class="spinner" id="spinner"></div>
        <span id="scan-label">🔍&nbsp; Scan Card</span>
      </button>

    </div>

    <!-- Results injected here -->
    <div id="result-section"></div>

  </div>

  <!-- ── Camera modal ── -->
  <div class="cam-overlay" id="cam-overlay">
    <div class="cam-modal">
      <div class="cam-header">
        <div class="cam-title">📷 Take a Photo</div>
        <button class="cam-close" id="cam-close">✕</button>
      </div>
      <div class="cam-video-wrap" id="cam-video-wrap">
        <!-- Loading state -->
        <div class="cam-loading" id="cam-loading">
          <div class="cam-loading-spinner"></div>
          Starting camera…
        </div>
        <video id="cam-video" autoplay playsinline muted></video>
        <div class="cam-corners">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="cam-status" id="cam-status">Position the card inside the frame</div>
        <div class="cam-flash" id="cam-flash"></div>
      </div>
      <canvas id="cam-canvas"></canvas>
      <div class="cam-footer">
        <button class="btn-flip" id="btn-flip" title="Flip camera">🔄</button>
        <button class="btn-capture" id="btn-capture" title="Take photo">📸</button>
        <div style="width:44px"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://lumoslogic-ocr-backend.hf.space/api/v1/ocr';
    const API_KEY = 'test123';
    const fileInput = document.getElementById('file-input');
    const cameraInput = document.getElementById('camera-input');
    const cameraBtn = document.getElementById('camera-btn');
    const dropZone  = document.getElementById('drop-zone');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg  = document.getElementById('preview-img');
    const fileNameEl  = document.getElementById('file-name');
    const removeBtn   = document.getElementById('remove-btn');
    const scanBtn     = document.getElementById('scan-btn');
    const spinner     = document.getElementById('spinner');
    const scanLabel   = document.getElementById('scan-label');
    const resultSection = document.getElementById('result-section');

    let selectedFile = null;

    // ── Connection prewarming for faster requests ──────────────────────────
    (async function prewarmConnection() {
      try {
        await fetch(API_URL.replace('/ocr', '/health'), { 
          method: 'GET',
          headers: { 'x-api-key': API_KEY }
        });
      } catch (e) {
        // Ignore errors, just trying to establish connection
